services:
  context7:
    image: node:20-alpine
    container_name: mcp_context7
    working_dir: /workspace
    volumes:
      - ./:/workspace:delegated
      - /tmp:/tmp:delegated
    env_file:
      - .env
    command: sleep infinity
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -n \"$CONTEXT7_API_KEY\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  filesystem-personal:
    image: node:20-alpine
    container_name: mcp_filesystem_personal
    working_dir: /workspace
    volumes:
      - ./:/workspace:delegated
      - ${FILESYSTEM_PATH:-/Volumes/Data/my-labs}:/data:delegated
      - /tmp:/tmp:delegated
    env_file:
      - .env
    command: sleep infinity
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -d /data"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  github-personal:
    image: node:20-alpine
    container_name: mcp_github_personal
    working_dir: /workspace
    volumes:
      - ./:/workspace:delegated
      - /tmp:/tmp:delegated
    env_file:
      - .env
    command: sleep infinity
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -n \"$GITHUB_PERSONAL_ACCESS_TOKEN\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  jira:
    image: node:20-alpine
    container_name: mcp_jira
    working_dir: /workspace
    volumes:
      - ./:/workspace:delegated
      - /tmp:/tmp:delegated
    env_file:
      - .env
    command: sleep infinity
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -n \"$JIRA_HOST\" && test -n \"$JIRA_EMAIL\" && test -n \"$JIRA_API_TOKEN\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  slack:
    image: node:20-alpine
    container_name: mcp_slack
    working_dir: /workspace
    volumes:
      - ./:/workspace:delegated
      - /tmp:/tmp:delegated
    env_file:
      - .env
    command: sleep infinity
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -n \"$SLACK_BOT_TOKEN\" && test -n \"$SLACK_TEAM_ID\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s